---
- name: Asegurar directorio .ssh
  become: true
  become_user: "{{ item.name }}"
  ansible.builtin.file:
    path: "~{{ item.name }}/.ssh"
    state: directory
    mode: "0700"
  loop: "{{ dev_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Generar clave SSH ED25519
  become: true
  become_user: "{{ item.name }}"
  ansible.builtin.command:
    cmd: "ssh-keygen -t ed25519 -a 100 -f ~{{ item.name }}/.ssh/id_ed25519 -N '' -C '{{ item.git_email }}'"
    creates: "~{{ item.name }}/.ssh/id_ed25519"
  loop: "{{ dev_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ajustar permisos de la clave privada
  become: true
  become_user: "{{ item.name }}"
  ansible.builtin.file:
    path: "~{{ item.name }}/.ssh/id_ed25519"
    mode: "0600"
  loop: "{{ dev_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ajustar permisos de la clave publica
  become: true
  become_user: "{{ item.name }}"
  ansible.builtin.file:
    path: "~{{ item.name }}/.ssh/id_ed25519.pub"
    mode: "0644"
  loop: "{{ dev_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Configurar SSH para GitHub
  become: true
  become_user: "{{ item.name }}"
  ansible.builtin.copy:
    dest: "~{{ item.name }}/.ssh/config"
    content: |
      Host github.com
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes
        User git
    mode: "0600"
  loop: "{{ dev_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Leer clave publica
  become: true
  become_user: "{{ item.name }}"
  ansible.builtin.slurp:
    src: "~{{ item.name }}/.ssh/id_ed25519.pub"
  register: ssh_pub_key
  loop: "{{ dev_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Mostrar clave publica
  ansible.builtin.debug:
    msg: "Clave publica de {{ item.item.name }} para GitHub: {{ item.content | b64decode | trim }}"
  loop: "{{ ssh_pub_key.results }}"
  loop_control:
    label: "{{ item.item.name }}"
