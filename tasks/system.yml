---
- name: Limpiar cache de apt antes de instalar
  ansible.builtin.command:
    cmd: apt-get clean
  changed_when: false

- name: Reconfigurar paquetes interrumpidos si los hay
  ansible.builtin.command:
    cmd: dpkg --configure -a
  changed_when: false
  ignore_errors: true

- name: Corregir dependencias rotas de apt
  ansible.builtin.command:
    cmd: apt --fix-broken install -y
  changed_when: false
  ignore_errors: true

- name: Actualizar cache de apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  changed_when: false

- name: Instalar dependencias base
  ansible.builtin.apt:
    name:
      - git
      - rsync
      - curl
      - wget
      - unzip
      - zip
      - apt-transport-https
      - ca-certificates
      - gnupg
      - software-properties-common
      - acl
      - build-essential
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - openssh-server
    state: present

- name: Asegurar que el servicio SSH esta activo
  ansible.builtin.systemd:
    name: ssh
    state: started
    enabled: true

- name: Asegurar que el directorio de keyrings existe
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Descargar claves GPG de repositorios externos
  ansible.builtin.get_url:
    url: "{{ item.key_url }}"
    dest: "{{ item.key_dest }}"
    mode: "0644"
  loop: "{{ apt_external_repos }}"
  loop_control:
    label: "{{ item.name }}"

- name: Anadir repositorios externos
  ansible.builtin.apt_repository:
    repo: "{{ item.repo }}"
    state: present
    filename: "{{ item.filename }}"
  loop: "{{ apt_external_repos }}"
  loop_control:
    label: "{{ item.name }}"

- name: Instalar paquetes de repositorios externos
  ansible.builtin.apt:
    name: "{{ item.packages }}"
    state: present
    update_cache: true
  loop: "{{ apt_external_repos }}"
  loop_control:
    label: "{{ item.name }}"

- name: Asegurar que Docker esta activo
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

